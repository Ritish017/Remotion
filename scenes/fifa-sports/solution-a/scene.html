<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Grotesk:wght@400;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap');
:root {
  --video-width: 1080px; --video-height: 1080px;
  --color-accent: #FFD700; --color-bg: #050a14;
  --color-secondary: #FFA500; --color-glow: rgba(255,215,0,0.25);
  --color-text: #ffffff; --color-muted: rgba(255,255,255,0.65);
  --motion-speed: 0.8; --motion-stagger: 0.15;
  --safe-zone-top: 60px; --safe-zone-bottom: 60px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { width:var(--video-width); height:var(--video-height); background:var(--color-bg); overflow:hidden; position:relative; }
.bg-pattern { position:absolute; inset:0; background:radial-gradient(ellipse at 50% 80%, rgba(255,215,0,0.08) 0%, transparent 60%); z-index:0; }
.content { position:relative; z-index:10; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:var(--safe-zone-top) 80px var(--safe-zone-bottom); gap:32px; height:100%; }
.section-label { font-family:'JetBrains Mono',monospace; font-size:15px; color:var(--color-accent); letter-spacing:0.35em; text-transform:uppercase; opacity:0; }
.headline { font-family:'Bebas Neue',sans-serif; font-size:88px; line-height:0.95; color:var(--color-text); opacity:0; transform:scale(0.9); }
.reasons { display:flex; flex-direction:column; gap:20px; width:100%; }
.reason { display:flex; gap:20px; align-items:center; background:rgba(255,215,0,0.06); border:1px solid rgba(255,215,0,0.15); border-radius:8px; padding:20px 28px; opacity:0; transform:translateY(30px); text-align:left; }
.reason-icon { font-size:28px; flex-shrink:0; }
.reason-text { font-family:'Space Grotesk',sans-serif; font-size:24px; color:var(--color-text); line-height:1.35; }
.score-prediction { display:flex; flex-direction:column; align-items:center; gap:8px; opacity:0; transform:scale(0.8); }
.score-label { font-family:'JetBrains Mono',monospace; font-size:14px; color:var(--color-muted); letter-spacing:0.3em; text-transform:uppercase; }
.score-value { font-family:'Bebas Neue',sans-serif; font-size:100px; color:var(--color-accent); line-height:1; text-shadow:0 0 40px var(--color-glow); }
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="content">
  <div class="section-label" id="sl">OUR PREDICTION</div>
  <div class="headline" id="hl" data-placeholder="solution_headline">Here's Who Takes It</div>
  <div class="reasons">
    <div class="reason" id="r1"><div class="reason-icon">⚡</div><div class="reason-text" data-placeholder="solution_key_1">Home advantage gives the decisive edge</div></div>
    <div class="reason" id="r2"><div class="reason-icon">🎯</div><div class="reason-text" data-placeholder="solution_key_2">Star striker returns from suspension tonight</div></div>
  </div>
  <div class="score-prediction" id="score">
    <div class="score-label">Predicted Score</div>
    <div class="score-value" data-placeholder="hook_stat">2 - 1</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/SplitText.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/DrawSVGPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/MorphSVGPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrambleTextPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/CustomEase.min.js"></script>
<script>
gsap.registerPlugin(SplitText, DrawSVGPlugin, MorphSVGPlugin, ScrambleTextPlugin, CustomEase);
CustomEase.create('premium','M0,0 C0.16,1 0.3,1 1,1');
CustomEase.create('punchIn','M0,0 C0.5,-0.5 0.7,1.5 1,1');
const speed=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--motion-speed'))||0.8;
const stagger=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--motion-stagger'))||0.15;
const sl=document.getElementById('sl'),hl=document.getElementById('hl'),r1=document.getElementById('r1'),r2=document.getElementById('r2'),sc=document.getElementById('score');
gsap.set([sl,hl,r1,r2,sc],{opacity:0}); gsap.set(hl,{scale:0.9}); gsap.set([r1,r2],{y:30}); gsap.set(sc,{scale:0.8});
const tl=gsap.timeline({paused:true});
tl.to(sl,{opacity:1,duration:0.4/speed,ease:'premium'})
  .to(hl,{opacity:1,scale:1,duration:0.6/speed,ease:'punchIn'},'+=0.1')
  .to([r1,r2],{opacity:1,y:0,duration:0.5/speed,ease:'premium',stagger:stagger},'+=0.15')
  .to(sc,{opacity:1,scale:1,duration:0.6/speed,ease:'punchIn'},'+=0.2');
window.__timelines=window.__timelines||{};window.__timelines['fifa-sports-solution-a']=tl;
</script>
</body></html>
