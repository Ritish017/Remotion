<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Grotesk:wght@400;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap');
:root {
  --video-width: 1080px; --video-height: 1080px;
  --color-accent: #FFD700; --color-bg: #050a14;
  --color-secondary: #FFA500; --color-glow: rgba(255,215,0,0.25);
  --color-text: #ffffff; --color-muted: rgba(255,255,255,0.65);
  --motion-speed: 0.8; --motion-stagger: 0.15;
  --safe-zone-top: 60px; --safe-zone-bottom: 60px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { width:var(--video-width); height:var(--video-height); background:var(--color-bg); overflow:hidden; display:flex; align-items:center; justify-content:center; position:relative; }
.bg-glow { position:absolute; inset:0; background:radial-gradient(ellipse at center, rgba(255,215,0,0.1) 0%, transparent 65%); }
.content { position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; text-align:center; gap:32px; padding:var(--safe-zone-top) 60px var(--safe-zone-bottom); width:100%; }
.cta-question { font-family:'Bebas Neue',sans-serif; font-size:96px; line-height:0.9; color:var(--color-text); opacity:0; transform:scale(0.85); }
.cta-accent { color:var(--color-accent); }
.poll-label { font-family:'JetBrains Mono',monospace; font-size:16px; color:var(--color-muted); letter-spacing:0.3em; text-transform:uppercase; opacity:0; }
.poll-options { display:flex; gap:24px; width:100%; opacity:0; transform:translateY(30px); }
.poll-option { flex:1; border:2px solid rgba(255,255,255,0.15); border-radius:12px; padding:20px 16px; display:flex; flex-direction:column; align-items:center; gap:8px; transition:border-color 0.3s; }
.poll-option.home { border-color:rgba(255,107,107,0.5); }
.poll-option.away { border-color:rgba(67,97,238,0.5); }
.poll-flag { font-size:40px; }
.poll-team { font-family:'Bebas Neue',sans-serif; font-size:36px; color:var(--color-text); }
.poll-option.home .poll-bar { background:#ef4444; }
.poll-option.away .poll-bar { background:#4361ee; }
.poll-bar-wrap { width:100%; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; margin-top:8px; }
.poll-bar { height:100%; border-radius:3px; width:50%; }
.comment-cta { font-family:'Space Grotesk',sans-serif; font-size:24px; color:var(--color-muted); opacity:0; }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="content">
  <div class="cta-question" id="cq"><span data-placeholder="cta_text">WHO WINS</span><span class="cta-accent">?</span></div>
  <div class="poll-label" id="pl" data-placeholder="cta_urgency">Comment your pick below</div>
  <div class="poll-options" id="po">
    <div class="poll-option home">
      <div class="poll-flag">🏠</div>
      <div class="poll-team" data-placeholder="home_team">HOME</div>
      <div class="poll-bar-wrap"><div class="poll-bar" style="width:52%"></div></div>
    </div>
    <div class="poll-option away">
      <div class="poll-flag">✈️</div>
      <div class="poll-team" data-placeholder="away_team">AWAY</div>
      <div class="poll-bar-wrap"><div class="poll-bar" style="width:48%"></div></div>
    </div>
  </div>
  <div class="comment-cta" id="cc">👇 Drop your prediction in the comments</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/SplitText.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/DrawSVGPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/MorphSVGPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrambleTextPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/CustomEase.min.js"></script>
<script>
gsap.registerPlugin(SplitText, DrawSVGPlugin, MorphSVGPlugin, ScrambleTextPlugin, CustomEase);
CustomEase.create('premium','M0,0 C0.16,1 0.3,1 1,1');
CustomEase.create('punchIn','M0,0 C0.5,-0.5 0.7,1.5 1,1');
const speed=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--motion-speed'))||0.8;
const cq=document.getElementById('cq'),pl=document.getElementById('pl'),po=document.getElementById('po'),cc=document.getElementById('cc');
gsap.set([cq,pl,po,cc],{opacity:0}); gsap.set(cq,{scale:0.85}); gsap.set(po,{y:30});
const tl=gsap.timeline({paused:true});
tl.to(cq,{opacity:1,scale:1,duration:0.6/speed,ease:'punchIn'})
  .to(pl,{opacity:1,duration:0.4/speed,ease:'premium'},'+=0.1')
  .to(po,{opacity:1,y:0,duration:0.5/speed,ease:'punchIn'},'+=0.1')
  .to(cc,{opacity:1,duration:0.4/speed,ease:'premium'},'+=0.15');
window.__timelines=window.__timelines||{};window.__timelines['fifa-sports-cta-a']=tl;
</script>
</body></html>
