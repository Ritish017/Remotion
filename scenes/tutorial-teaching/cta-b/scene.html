<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Grotesk:wght@400;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap');
:root {
  --video-width: 1920px; --video-height: 1080px;
  --color-accent: #fbbf24; --color-bg: #0d0d0d;
  --color-secondary: #f59e0b; --color-glow: rgba(251,191,36,0.2);
  --color-text: #ffffff; --color-muted: rgba(255,255,255,0.6);
  --motion-speed: 1.0; --motion-stagger: 0.1;
  --safe-zone-top: 48px; --safe-zone-bottom: 48px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { width:var(--video-width); height:var(--video-height); background:var(--color-bg); overflow:hidden; display:flex; align-items:center; justify-content:center; position:relative; }
.pulse-border { position:absolute; inset:20px; border:2px solid var(--color-accent); border-radius:4px; opacity:0; box-shadow:0 0 60px var(--color-glow), inset 0 0 60px var(--color-glow); }
.bg-radial { position:absolute; inset:0; background:radial-gradient(ellipse at center, var(--color-glow) 0%, transparent 60%); }
.content { position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; text-align:center; gap:32px; padding:var(--safe-zone-top) 120px var(--safe-zone-bottom); }
.cta-main { font-family:'Bebas Neue',sans-serif; font-size:160px; line-height:0.9; color:var(--color-text); letter-spacing:-4px; opacity:0; transform:scale(0.9); }
.cta-accent { color:var(--color-accent); }
.urgency { font-family:'Space Grotesk',sans-serif; font-size:32px; color:var(--color-muted); letter-spacing:0.05em; opacity:0; }
.channel-name { font-family:'JetBrains Mono',monospace; font-size:24px; color:var(--color-accent); letter-spacing:0.15em; opacity:0; transform:translateY(20px); }
.divider { width:80px; height:3px; background:var(--color-accent); opacity:0; }
</style>
</head>
<body>
<div class="bg-radial"></div>
<div class="pulse-border" id="pulseBorder"></div>
<div class="content">
  <div class="cta-main"><span data-placeholder="cta_text">FOLLOW FOR<br><span class="cta-accent">MORE</span></span></div>
  <div class="divider" id="divider"></div>
  <div class="urgency" data-placeholder="cta_urgency">New video every week</div>
  <div class="channel-name" data-placeholder="channel_name">@CatalystStudio</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/SplitText.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/DrawSVGPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/MorphSVGPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrambleTextPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/CustomEase.min.js"></script>
<script>
gsap.registerPlugin(SplitText, DrawSVGPlugin, MorphSVGPlugin, ScrambleTextPlugin, CustomEase);
CustomEase.create('premium','M0,0 C0.16,1 0.3,1 1,1');
CustomEase.create('punchIn','M0,0 C0.5,-0.5 0.7,1.5 1,1');
const speed=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--motion-speed'))||1.0;
const cm=document.querySelector('.cta-main'),urg=document.querySelector('.urgency'),ch=document.querySelector('.channel-name'),pb=document.getElementById('pulseBorder'),dv=document.getElementById('divider');
gsap.set([cm,urg,ch,pb,dv],{opacity:0}); gsap.set(cm,{scale:0.9}); gsap.set(ch,{y:20});
const tl=gsap.timeline({paused:true});
tl.to(pb,{opacity:0.6,duration:0.5/speed,ease:'premium'})
  .to(cm,{opacity:1,scale:1,duration:0.7/speed,ease:'punchIn'},'+=0.1')
  .to(dv,{opacity:1,width:'80px',duration:0.4/speed,ease:'power2.out'},'+=0.1')
  .to(urg,{opacity:1,duration:0.5/speed,ease:'premium'},'+=0.1')
  .to(ch,{opacity:1,y:0,duration:0.5/speed,ease:'premium'},'+=0.1')
  .to(pb,{boxShadow:'0 0 100px var(--color-glow), inset 0 0 100px var(--color-glow)',duration:1.5/speed,ease:'sine.inOut',repeat:-1,yoyo:true},'+=0.2');
window.__timelines=window.__timelines||{};window.__timelines['tutorial-teaching-cta-b']=tl;
</script>
</body></html>
