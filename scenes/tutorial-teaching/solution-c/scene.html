<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Grotesk:wght@400;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap');
:root {
  --video-width: 1920px; --video-height: 1080px;
  --color-accent: #00d4ff; --color-bg: #000000;
  --color-secondary: #7b2fff; --color-glow: rgba(0,212,255,0.2);
  --color-text: #ffffff; --color-muted: rgba(255,255,255,0.6);
  --motion-speed: 1.0; --motion-stagger: 0.1;
  --safe-zone-top: 48px; --safe-zone-bottom: 48px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { width:var(--video-width); height:var(--video-height); background:var(--color-bg); overflow:hidden; position:relative; }
.bg-glow { position:absolute; top:-20%; right:-10%; width:800px; height:800px; border-radius:50%; background:radial-gradient(circle, var(--color-glow) 0%, transparent 70%); pointer-events:none; }
.content { position:relative; z-index:10; display:grid; grid-template-columns:1fr 1fr; width:100%; height:100%; }
.left { display:flex; flex-direction:column; justify-content:center; padding:var(--safe-zone-top) 60px var(--safe-zone-bottom) 120px; gap:36px; }
.right { display:flex; flex-direction:column; justify-content:center; padding:var(--safe-zone-top) 120px var(--safe-zone-bottom) 60px; }
.section-label { font-family:'JetBrains Mono',monospace; font-size:16px; color:var(--color-accent); letter-spacing:0.3em; text-transform:uppercase; opacity:0; }
.headline { font-family:'Syne',sans-serif; font-size:64px; font-weight:800; line-height:1.1; color:var(--color-text); opacity:0; transform:translateY(40px); }
.key-point { display:flex; align-items:flex-start; gap:20px; opacity:0; transform:translateX(-30px); }
.key-icon { width:40px; height:40px; border-radius:50%; background:var(--color-accent); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#000; font-weight:700; font-size:18px; font-family:'JetBrains Mono',monospace; }
.key-text { font-family:'Space Grotesk',sans-serif; font-size:26px; color:var(--color-text); line-height:1.4; }
.key-points { display:flex; flex-direction:column; gap:32px; }
.code-panel { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-left:4px solid var(--color-accent); border-radius:8px; padding:32px; opacity:0; transform:translateY(20px); }
.code-line { font-family:'JetBrains Mono',monospace; font-size:20px; line-height:2; }
.code-keyword { color:var(--color-accent); }
.code-string { color:#f9a8d4; }
.code-comment { color:rgba(255,255,255,0.3); }
.stat-result { margin-top:24px; font-family:'Bebas Neue',sans-serif; font-size:72px; color:var(--color-accent); line-height:1; opacity:0; }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="content">
  <div class="left">
    <div class="section-label">THE SOLUTION</div>
    <div class="headline" data-placeholder="solution_headline">The 3-Step Method That Actually Works</div>
    <div class="key-points">
      <div class="key-point" id="kp1"><div class="key-icon">1</div><div class="key-text" data-placeholder="solution_key_1">Start with a working example</div></div>
      <div class="key-point" id="kp2"><div class="key-icon">2</div><div class="key-text" data-placeholder="solution_key_2">Understand the why before the how</div></div>
      <div class="key-point" id="kp3"><div class="key-icon">3</div><div class="key-text" data-placeholder="solution_key_3">Build something real in 10 minutes</div></div>
    </div>
  </div>
  <div class="right">
    <div class="code-panel">
      <div class="code-line"><span class="code-comment">// The simple way</span></div>
      <div class="code-line"><span class="code-keyword">const</span> result = <span class="code-keyword">await</span> solve(</div>
      <div class="code-line">&nbsp;&nbsp;<span class="code-string">"your problem"</span></div>
      <div class="code-line">);</div>
      <div class="code-line"><span class="code-comment">// Done in seconds âœ“</span></div>
    </div>
    <div class="stat-result" data-placeholder="hook_stat">3Ã—</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/SplitText.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/DrawSVGPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/MorphSVGPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrambleTextPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/CustomEase.min.js"></script>
<script>
gsap.registerPlugin(SplitText, DrawSVGPlugin, MorphSVGPlugin, ScrambleTextPlugin, CustomEase);
CustomEase.create('premium','M0,0 C0.16,1 0.3,1 1,1');
CustomEase.create('punchIn','M0,0 C0.5,-0.5 0.7,1.5 1,1');
const speed=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--motion-speed'))||1.0;
const stagger=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--motion-stagger'))||0.1;
const sl=document.querySelector('.section-label'),hl=document.querySelector('.headline'),cp=document.querySelector('.code-panel'),sr=document.querySelector('.stat-result');
const kps=[document.getElementById('kp1'),document.getElementById('kp2'),document.getElementById('kp3')];
gsap.set([sl,hl,cp,sr,...kps],{opacity:0}); gsap.set(hl,{y:40}); gsap.set(kps,{x:-30}); gsap.set(cp,{y:20});
const tl=gsap.timeline({paused:true});
tl.to(sl,{opacity:1,duration:0.4/speed,ease:'premium'})
  .to(hl,{opacity:1,y:0,duration:0.7/speed,ease:'punchIn'},'+=0.1')
  .to(kps,{opacity:1,x:0,duration:0.5/speed,ease:'premium',stagger:stagger},'+=0.2')
  .to(cp,{opacity:1,y:0,duration:0.6/speed,ease:'premium'},'+=0.1')
  .to(sr,{opacity:1,duration:0.5/speed,ease:'punchIn'},'+=0.2');
window.__timelines=window.__timelines||{};window.__timelines['tutorial-teaching-solution-c']=tl;
</script>
</body></html>
